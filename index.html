<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenix Studio - We've Moved</title>
    <!-- Google Fonts for a sleek tech look --> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Automatic Redirect after 5 seconds -->
    <meta http-equiv="refresh" content="5;url=https://codenix.pages.dev">

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131a26;
            --accent-cyan: #00f2fe;
            --accent-purple: #4facfe;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Subtle glowing background accents */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            left: 15%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.1) 0%, rgba(0,0,0,0) 73%);
            bottom: 10%;
            right: 10%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(8px);
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-weight: 400;
            color: var(--text-muted);
            -webkit-text-fill-color: initial;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .url-box {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-cyan);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: #000000;
            font-weight: 600;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        }

        .countdown {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        #timer {
            color: var(--accent-cyan);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Brand Logo -->
        <div class="logo">CODENIX<span>_STUDIO</span></div>
        
        <!-- Main Message -->
        <h1>We have a new home</h1>
        <p>Codenix Studio has officially migrated to a faster, updated domain to better serve our projects and clients.</p>
        
        <!-- New URL Display -->
        <div class="url-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            codenix.pages.dev
        </div>

        <!-- Call to Action -->
        <a href="https://codenix.pages.dev" class="btn">Visit New Site</a>
        
        <!-- Live Countdown -->
        <div class="countdown">
            Redirecting you automatically in <span id="timer">5</span> seconds...
        </div>
    </div>

    <!-- Script to handle visual countdown -->
    <script>
        let timeLeft = 5;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
            }
        }, 1000);
    </script>
</body>
</html>
